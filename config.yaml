# Global defaults and concurrency controls
global:
  concurrency_limit: 8          # Maximum parallel API requests to prevent rate limit issues
  request_delay: 1.0            # Delay in seconds between starting requests
  default_timeout: 500.0        # Default network request timeout in seconds
  output_dir: "./output"        # Where final compiled .apkg files land
  cache_db_path: "./llm2deck.db" # SQLite database path for runs, steps, and caching
  keys_file_path: "./keys.yaml" # Path to keys file where all providers' keys are stored

# Definition of available LLM providers (excluding raw keys)
providers:
  openai:
    base_url: "https://api.openai.com/v1"
    temperature: 0.3
  cerebras:
    base_url: "https://api.cerebras.ai/v1"
    temperature: 0.2
  ollama_local:
    base_url: "http://localhost:11434/v1"
    temperature: 0.0

# Assignment of models to pipeline stages using the "provider/model" convention.
# Format: <provider_name>/<model_name_path>
pipeline:
  # Stage 1: Parallel Initial Generation (raw text extraction)
  generation:
    models:
      - "openai/gpt-3.5-turbo"
      - "cerebras/llama3.1-70b"
  
  # Stage 2: Synthesis (frontier model merges and deduplicates)
  synthesis:
    model: "openai/gpt-4o"
  
  # Stage 3: Loose JSON Translation
  translation:
    model: "openai/gpt-3.5-turbo"
  
  # Stage 4: Strict JSON Schema Enforcement
  schema_enforcement:
    model: "openai/gpt-3.5-turbo"
